<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 Трекер сдачи — BLACK-ROSE</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; padding: 20px; }
  .container { max-width: 1300px; margin: 0 auto; }

  .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
  .header-left { display: flex; align-items: baseline; gap: 20px; flex-wrap: wrap; }
  .header-left h1 { font-size: 24px; }
  .brand { font-size: 32px; font-weight: 900; color: #1a1a2e; letter-spacing: 2px; background: linear-gradient(135deg, #1a1a2e, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat { background: white; padding: 12px 20px; border-radius: 10px; min-width: 120px; border-left: 3px solid #3b82f6; }
  .stat-label { font-size: 11px; color: #6b7280; text-transform: uppercase; }
  .stat-value { font-size: 22px; font-weight: 700; }

  .status { background: #dbeafe; padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 14px; color: #1e40af; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
  .dot.offline { background: #ef4444; animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .toolbar { background: white; padding: 12px 16px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid #e5e7eb; }
  .toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .toolbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #3b82f6; color: white; }
  .btn-primary:hover { background: #2563eb; }
  .btn-sort { background: #e5e7eb; color: #1a1a2e; }
  .btn-sort:hover { background: #d1d5db; }
  .btn-save { background: #10b981; color: white; }
  .btn-save:hover { background: #059669; }
  .btn-danger { background: #ef4444; color: white; }
  .btn-danger:hover { background: #dc2626; }
  .btn-success { background: #22c55e; color: white; padding: 4px 10px; font-size: 12px; }
  .btn-success:hover { background: #16a34a; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .dropdown { position: relative; display: inline-block; }
  .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: white; min-width: 240px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 100; overflow: hidden; margin-top: 4px; max-height: 350px; overflow-y: auto; }
  .dropdown-content.show { display: block; }
  .dropdown-content .dropdown-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border: none; background: none; text-align: left; font-size: 13px; cursor: pointer; transition: background 0.15s; color: #1a1a2e; width: 100%; }
  .dropdown-content .dropdown-item:hover { background: #f3f4f6; }
  .dropdown-content .dropdown-item .name { flex: 1; cursor: pointer; }
  .dropdown-content .dropdown-item .delete-btn { margin-left: 12px; color: #9ca3af; cursor: pointer; font-size: 14px; background: none; border: none; }
  .dropdown-content .dropdown-item .delete-btn:hover { color: #ef4444; }
  .dropdown-content .divider { height: 1px; background: #e5e7eb; margin: 4px 0; }
  .dropdown-content .new-save-btn { background: #dbeafe; color: #1e40af; font-weight: 600; }
  .dropdown-content .new-save-btn:hover { background: #bfdbfe; }
  .dropdown-content .empty-message { padding: 16px; text-align: center; color: #9ca3af; font-size: 13px; }

  table { width: 100%; border-collapse: collapse; background: white; border-radius: 0 0 10px 10px; overflow: hidden; }
  th { background: #f8fafc; padding: 12px 16px; text-align: center; font-size: 11px; text-transform: uppercase; color: #475569; border-bottom: 2px solid #e2e8f0; }
  td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; text-align: center; }
  tr:hover { background: #f8fafc; }

  .name-cell { display: flex; align-items: center; gap: 12px; font-weight: 600; text-align: left; }
  .name-cell .name-text { cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: background 0.2s; }
  .name-cell .name-text:hover { background: #e5e7eb; }
  .name-cell .name-input { font-weight: 600; font-size: 14px; padding: 2px 6px; border: 2px solid #3b82f6; border-radius: 4px; outline: none; font-family: inherit; width: auto; min-width: 100px; background: white; }

  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .avatar.gold { background
