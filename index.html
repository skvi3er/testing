<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 Трекер сдачи продукции</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui; background: #f0f2f5; padding: 20px; }
  .container { max-width: 1200px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
  h1 { font-size: 24px; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat { background: white; padding: 12px 20px; border-radius: 10px; min-width: 120px; border-left: 3px solid #3b82f6; }
  .stat-label { font-size: 11px; color: #6b7280; text-transform: uppercase; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .status { background: #dbeafe; padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 14px; color: #1e40af; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
  .dot.offline { background: #ef4444; animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .toolbar { background: white; padding: 12px 16px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid #e5e7eb; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 0 0 10px 10px; overflow: hidden; }
  th { background: #f8fafc; padding: 12px 16px; text-align: left; font-size: 12px; text-transform: uppercase; color: #475569; border-bottom: 2px solid #e2e8f0; cursor: pointer; }
  td { padding: 10px 16px; border-bottom: 1px solid #f1f5f9; }
  tr:hover { background: #f8fafc; }
  input[type="number"] { width: 80px; padding: 6px 10px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 14px; text-align: center; font-weight: 600; background: #eff6ff; color: #3b82f6; }
  input[type="number"]:focus { outline: none; border-color: #3b82f6; }
  .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; background: #e5e7eb; }
  .btn-primary { background: #3b82f6; color: white; }
  .btn-primary:hover { background: #2563eb; }
  .btn-danger { background: #ef4444; color: white; padding: 4px 10px; font-size: 18px; border-radius: 6px; border: none; cursor: pointer; }
  .btn-danger:hover { background: #dc2626; }
  .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-blue { background: #eff6ff; color: #3b82f6; }
  .badge-green { background: #ecfdf5; color: #10b981; }
  .badge-amber { background: #fffbeb; color: #d97706; }
  .badge-gray { background: #f3f4f6; color: #9ca3af; }
  .footer { background: #fafbfc; padding: 10px 16px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #6b7280; border-radius: 0 0 10px 10px; display: flex; justify-content: space-between; }
  .name-cell { display: flex; align-items: center; gap: 10px; font-weight: 600; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  .total-row { background: #f8fafc !important; font-weight: 700; border-top: 2px solid #e2e8f0; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <h1>📦 Трекер сдачи продукции</h1>
      <p style="color:#6b7280;font-size:14px;">Онлайн-синхронизация ☁️</p>
    </div>
    <div class="stats">
      <div class="stat" style="border-color:#3b82f6;">
        <div class="stat-label">Всего сдано</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat" style="border-color:#10b981;">
        <div class="stat-label">Остаток (40%)</div>
        <div class="stat-value" id="statRemain">0</div>
      </div>
      <div class="stat" style="border-color:#f59e0b;">
        <div class="stat-label">Призов (пачки)</div>
        <div class="stat-value" id="statPrize">0</div>
      </div>
    </div>
  </div>

  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Подключение к облаку...</span>
  </div>

  <div class="toolbar">
    <div>
      <input type="text" id="searchInput" placeholder="🔍 Поиск..." style="padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;width:200px;" oninput="renderTable()">
    </div>
    <button class="btn btn-primary" onclick="addPlayer()">➕ Добавить игрока</button>
  </div>

  <table>
    <thead>
      <tr>
        <th onclick="sortTable('name')">Игрок ↕</th>
        <th style="text-align:center">Кол-во</th>
        <th style="text-align:center">Накоплено</th>
        <th style="text-align:center">Остаток (40%)</th>
        <th style="text-align:center">Приз</th>
        <th style="width:50px"></th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="6" style="text-align:center;padding:40px;color:#9ca3af;">🔄 Загрузка...</td></tr>
    </tbody>
  </table>

  <div class="footer">
    <span id="rowCount">0 игроков</span>
    <span>☁️ Данные в облаке</span>
  </div>
</div>

<script>
// ==========================================
// 🔥 ВАШ КОНФИГ (ВСТАВЬТЕ СЮДА)
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyBoE4goFQmwr-zmRBg9mtT3WEH67Ky5c6I",
  authDomain: "clan-bda68.firebaseapp.com",
  databaseURL: "https://clan-bda68-default-rtdb.firebaseio.com",
  projectId: "clan-bda68",
  storageBucket: "clan-bda68.firebasestorage.app",
  messagingSenderId: "316091052332",
  appId: "1:316091052332:web:92deff2d067afd8963bc89"
};
// ==========================================

firebase.initializeApp(firebaseConfig);
const dbRef = firebase.database().ref('tracker');

let players = [];
let nextId = 1;
let sortCol = null;
let sortAsc = true;

function updateStatus(online, text) {
  document.getElementById('statusDot').className = online ? 'dot' : 'dot offline';
  document.getElementById('statusText').textContent = text;
}

function getAvatar(name) {
  const colors = ['#667eea','#f093fb','#4facfe','#43e97b','#fa709a','#30cfd0','#ff9a9e','#84fab0'];
  let hash = 0;
  for (let c of name) hash = name.charCodeAt(0) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

function getInitials(name) {
  const parts = name.split(' ');
  return (parts[0]?parts[0][0]:'') + (parts[1]?parts[1][0]:'');
}

function calcCumulative(data) {
  let sum = 0;
  return data.map(p => {
    sum += p.amount;
    return { ...p, cumulative: sum };
  });
}

function getSorted() {
  let data = [...players];
  if (sortCol === 'name') data.sort((a,b) => sortAsc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));
  if (sortCol === 'amount') data.sort((a,b) => sortAsc ? a.amount - b.amount : b.amount - a.amount);
  return calcCumulative(data);
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let data = getSorted().filter(p => p.name.toLowerCase().includes(search));

  let total = 0, remain = 0, prize = 0;
  players.forEach(p => {
    total += p.amount;
    remain += Math.floor(p.amount * 0.4);
    prize += Math.floor(p.amount / 100);
  });
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statRemain').textContent = remain;
  document.getElementById('statPrize').textContent = prize;
  document.getElementById('rowCount').textContent = players.length + ' игроков';

  if (!players.length) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#9ca3af;">👾 Нет игроков. Добавьте первого!</td></tr>';
    return;
  }

  let max = Math.max(1, ...players.map(p => p.amount));
  let html = '';
  data.forEach(p => {
    const remainP = Math.floor(p.amount * 0.4);
    const prizeP = Math.floor(p.amount / 100);
    const progress = (p.amount / max * 100).toFixed(1);
    const empty = p.amount === 0;

    html += `<tr>
      <td><div class="name-cell"><div class="avatar" style="background:${getAvatar(p.name)}">${getInitials(p.name)}</div>${p.name}</div></td>
      <td style="text-align:center">
        <input type="number" value="${p.amount}" min="0" onchange="updateAmount(${p.id}, this.value)">
        <div style="width:100%;height:4px;background:#e5e7eb;border-radius:2px;margin-top:4px;">
          <div style="width:${progress}%;height:100%;background:${empty ? '#e5e7eb' : '#3b82f6'};border-radius:2px;"></div>
        </div>
      </td>
      <td style="text-align:center"><span class="badge badge-blue">${p.cumulative}</span></td>
      <td style="text-align:center"><span class="badge ${remainP > 0 ? 'badge-green' : 'badge-gray'}">${remainP}</span></td>
      <td style="text-align:center"><span class="badge ${prizeP > 0 ? 'badge-amber' : 'badge-gray'}">${prizeP} ${prizeP >= 2 ? '📦📦' : prizeP >= 1 ? '📦' : ''}</span></td>
      <td><button class="btn-danger" onclick="deletePlayer(${p.id})">×</button></td>
    </tr>`;
  });

  html += `<tr class="total-row">
    <td>📊 ИТОГО</td>
    <td style="text-align:center">${total}</td>
    <td style="text-align:center">${total}</td>
    <td style="text-align:center">${remain}</td>
    <td style="text-align:center">${prize} пачек</td>
    <td></td>
  </tr>`;

  document.getElementById('tableBody').innerHTML = html;
}

function saveToFirebase() {
  dbRef.set({ players, nextId })
    .then(() => updateStatus(true, '☁️ Синхронизировано'))
    .catch(() => updateStatus(false, '⚠️ Ошибка соединения'));
}

function loadFromFirebase() {
  updateStatus(false, '🔄 Подключение...');
  dbRef.on('value', snap => {
    const data = snap.val();
    if (data && data.players) {
      players = data.players;
      nextId = data.nextId || 1;
      updateStatus(true, '☁️ Синхронизировано');
    } else {
      players = [
        { id: 1, name: "Иванов Иван", amount: 150 },
        { id: 2, name: "Петров Петр", amount: 230 },
        { id: 3, name: "Сидоров Алексей", amount: 0 },
        { id: 4, name: "Козлова Мария", amount: 310 },
        { id: 5, name: "Новиков Дмитрий", amount: 180 },
        { id: 6, name: "Морозова Анна", amount: 0 },
        { id: 7, name: "Волков Сергей", amount: 250 },
        { id: 8, name: "Лебедева Ольга", amount: 120 }
      ];
      nextId = 9;
      setTimeout(saveToFirebase, 500);
    }
    renderTable();
  }, () => updateStatus(false, '⚠️ Ошибка соединения'));
}

function updateAmount(id, val) {
  const p = players.find(p => p.id === id);
  if (p) {
    p.amount = Math.max(0, parseInt(val) || 0);
    renderTable();
    saveToFirebase();
  }
}

function addPlayer() {
  const name = prompt('Введите имя игрока:');
  if (name && name.trim()) {
    players.push({ id: nextId++, name: name.trim(), amount: 0 });
    renderTable();
    saveToFirebase();
  }
}

function deletePlayer(id) {
  if (confirm('Удалить игрока?')) {
    players = players.filter(p => p.id !== id);
    renderTable();
    saveToFirebase();
  }
}

function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderTable();
}

loadFromFirebase();
</script>
</body>
</html>
